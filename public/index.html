<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>AR Filter Demo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f2f2f7;
        --bg-alt: #ffffff;
        --fg: #0f172a;
        --fg-muted: #6b7280;
        --accent: #007aff;
        --accent-soft: rgba(0, 122, 255, 0.12);
        --danger: #ef4444;
        --border-subtle: #e5e7eb;
        --card-radius: 18px;
        --font-main: -apple-system, system-ui, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font-main);
        background: radial-gradient(circle at top, #ffffff 0, #e5e7f0 55%, #dde1ee 100%);
        color: var(--fg);
        -webkit-font-smoothing: antialiased;
      }

      .app-root {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
      }

      .app-shell {
        width: 100%;
        max-width: 420px;
        background: var(--bg-alt);
        border-radius: 28px;
        border: 1px solid rgba(15, 23, 42, 0.06);
        box-shadow:
          0 24px 60px rgba(15, 23, 42, 0.20),
          0 0 0 0.5px rgba(148, 163, 184, 0.35);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .app-header {
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(15, 23, 42, 0.06);
        background: linear-gradient(135deg, #f9fafb 0, #eef2ff 60%, #e0f2fe 100%);
      }

      .app-title {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .app-logo {
        width: 26px;
        height: 26px;
        border-radius: 9px;
        background: conic-gradient(
          from 210deg,
          #38bdf8,
          #6366f1,
          #ec4899,
          #38bdf8
        );
        padding: 3px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .app-logo-inner {
        width: 100%;
        height: 100%;
        border-radius: 6px;
        background: radial-gradient(circle at 30% 10%, #ffffff 0, #dbeafe 60%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #020617;
        font-size: 14px;
        font-weight: 700;
      }

      .app-name {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.03em;
      }

      .app-meta {
        font-size: 11px;
        color: #6b7280;
      }

      .app-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 18px 18px 20px;
        gap: 14px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .screen {
        display: none;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
      }

      .screen.active {
        display: flex;
      }

      .screen-title {
        font-size: 19px;
        font-weight: 600;
        letter-spacing: 0.01em;
        margin-bottom: 2px;
      }

      .screen-subtitle {
        font-size: 14px;
        color: var(--fg-muted);
        line-height: 1.5;
      }

      .card {
        border-radius: var(--card-radius);
        border: 1px solid var(--border-subtle);
        background: linear-gradient(145deg, #ffffff 0, #f9fafb 60%, #eef2ff 100%);
        padding: 14px 14px 12px;
      }

      .card-contrast {
        background: linear-gradient(145deg, #f9fafb 0, #eef2ff 60%, #e0f2fe 100%);
      }

      .notice-heading {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .notice-text {
        font-size: 13px;
        line-height: 1.5;
        color: #111827; /* stronger contrast so long paragraphs stay clearly readable */
      }

      /* ensure all inline elements inside notice stay fully opaque and same color */
      .notice-text * {
        color: #111827;
        opacity: 1;
      }

      .notice-line-label {
        font-weight: 600;
        color: #111827; /* darker label so line headings are clearly readable */
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 6px;
      }

      .pill {
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.4);
        color: #374151;
        background: rgba(255, 255, 255, 0.8);
      }

      .pill-accent {
        border-color: rgba(56, 189, 248, 0.9);
        background: rgba(191, 219, 254, 0.6);
      }

      .btn-row {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: auto;
      }

      .btn {
        border-radius: 999px;
        border: none;
        padding: 11px 14px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: background 0.16s ease, color 0.16s ease, transform 0.08s ease,
          box-shadow 0.16s ease, opacity 0.16s ease;
      }

      .btn-primary {
        background: linear-gradient(135deg, #0f9dff, #007aff);
        color: #ffffff;
        box-shadow:
          0 10px 20px rgba(37, 99, 235, 0.35),
          0 0 0 0.5px rgba(96, 165, 250, 0.7);
      }

      .btn-primary:active {
        transform: translateY(1px) scale(0.99);
        box-shadow:
          0 6px 14px rgba(37, 99, 235, 0.4),
          0 0 0 0.5px rgba(129, 140, 248, 0.7);
      }

      .btn-secondary {
        background: #f3f4f6;
        color: #111827;
        border: 1px solid rgba(148, 163, 184, 0.6);
      }

      .btn-ghost {
        background: transparent;
        color: var(--fg-muted);
      }

      .btn-small {
        padding: 8px 12px;
        font-size: 12px;
      }

      .btn-disabled,
      .btn:disabled {
        opacity: 0.55;
        cursor: default;
        box-shadow: none;
      }

      .link-inline {
        font-size: 12px;
        color: var(--accent);
        text-decoration: underline;
        text-underline-offset: 3px;
        cursor: pointer;
      }

      .meta-text {
        font-size: 11px;
        color: var(--fg-muted);
      }

      .demo-shell {
        border-radius: 18px;
        border: 1px solid rgba(209, 213, 219, 0.9);
        background: linear-gradient(145deg, #f9fafb 0, #eff6ff 60%, #e0f2fe 100%);
        padding: 10px 10px 9px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .demo-video-frame {
        position: relative;
        border-radius: 16px;
        overflow: hidden;
        background: radial-gradient(circle at 20% 10%, #dbeafe 0, #e5e7eb 50%, #e5e7eb 100%);
        border: 1px solid rgba(148, 163, 184, 0.9);
        aspect-ratio: 3 / 4;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* -------- Thêm: Hiệu ứng hạt bụi, scanline, filter tag -------- */

      /* Hiệu ứng hạt bụi Film Grain */
      .grain-overlay {
        position: absolute;
        inset: 0;
        background: url('https://www.transparenttextures.com/patterns/stardust.png');
        opacity: 0;
        pointer-events: none;
        z-index: 5;
      }

      /* Thanh quét mặt giả lập AI Tracking */
      .scanner-line {
        position: absolute;
        left: 0;
        right: 0;
        height: 2px;
        background: rgba(34, 197, 94, 0.5);
        box-shadow: 0 0 15px #22c55e;
        top: 0;
        display: none;
        z-index: 6;
      }

      @keyframes scanMove {
        from { top: 10%; }
        to { top: 90%; }
      }

      /* Sticker/Tag cho filter */
      .filter-tag {
        position: absolute;
        top: 15px;
        left: 15px;
        background: rgba(0,0,0,0.5);
        color: white;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 11px;
        backdrop-filter: blur(4px);
        z-index: 10;
      }

      /* --------- (các css gốc bên dưới) ---------- */

      /* Sparkles & Dust overlay (TikTok style) */
      @keyframes grain {
        0%, 100% { transform:translate(0, 0); }
        10% { transform:translate(-5%, -10%); }
        30% { transform:translate(3%, -15%); }
        50% { transform:translate(-10%, 5%); }
        70% { transform:translate(8%, 10%); }
      }

      .demo-grain-overlay {
        position: absolute;
        inset: 0;
        background-image: url("https://www.transparenttextures.com/patterns/asfalt-dark.png"); /* Giả lập hạt bụi */
        opacity: 0.15;
        pointer-events: none;
        display: none;
        animation: grain 8s steps(10) infinite;
        z-index: 15;
      }

      .demo-video-frame.show-grain .demo-grain-overlay {
        display: block;
      }

      .demo-placeholder {
        position: relative;
        width: 70%;
        max-width: 220px;
        aspect-ratio: 3 / 4;
        border-radius: 999px;
        background: radial-gradient(circle at 20% 0, #f9fafb 0, #d1d5db 55%);
        box-shadow:
          0 14px 32px rgba(15, 23, 42, 0.25),
          0 0 0 1px rgba(148, 163, 184, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .demo-pulse-ring {
        position: absolute;
        inset: -18%;
        border-radius: inherit;
        border: 2px solid rgba(129, 140, 248, 0.2);
        box-shadow: 0 0 45px rgba(129, 140, 248, 0.45);
        animation: pulseRing 2.6s ease-out infinite;
      }

      .demo-face-mask {
        position: relative;
        width: 68%;
        height: 54%;
        border-radius: 40px;
        background: radial-gradient(circle at 50% 0, #6366f1 0, #a855f7 40%, #ec4899 100%);
        opacity: 0.85;
        box-shadow:
          0 16px 26px rgba(79, 70, 229, 0.7),
          0 0 0 1px rgba(191, 219, 254, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .demo-face-mask::before,
      .demo-face-mask::after {
        content: "";
        position: absolute;
        top: 42%;
        width: 22%;
        height: 8%;
        border-radius: 999px;
        background: radial-gradient(circle at 50% 0, #eff6ff 0, #1d4ed8 100%);
        box-shadow: 0 0 10px rgba(219, 234, 254, 0.6);
      }

      .demo-face-mask::before {
        left: 18%;
      }

      .demo-face-mask::after {
        right: 18%;
      }

      .demo-face-accent {
        position: absolute;
        bottom: 16%;
        left: 50%;
        transform: translateX(-50%);
        width: 40%;
        height: 9%;
        border-radius: 999px;
        border: 1px solid rgba(248, 250, 252, 0.8);
        background: linear-gradient(90deg, #f97316, #ec4899);
        box-shadow: 0 0 16px rgba(248, 250, 252, 0.85);
      }

      .demo-face-glow {
        position: absolute;
        inset: 18%;
        border-radius: inherit;
        background: radial-gradient(circle, rgba(249, 250, 251, 0.16), transparent);
        mix-blend-mode: screen;
      }

      @keyframes pulseRing {
        0% {
          transform: scale(0.96);
          opacity: 0.7;
        }
        70% {
          transform: scale(1.06);
          opacity: 0.1;
        }
        100% {
          transform: scale(1.09);
          opacity: 0;
        }
      }

      .demo-video-element,
      .demo-camera-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* -------- SOCIAL UI OVERLAY: Instagram/TikTok demo -------- */
      .demo-social-ui {
        position: absolute;
        inset: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 20px;
        z-index: 10;
      }
      .ui-top { display: flex; justify-content: space-between; align-items: center; }
      .ui-bottom { display: flex; flex-direction: column; align-items: center; gap: 10px; }

      .record-btn {
        width: 50px;
        height: 50px;
        border: 4px solid white;
        border-radius: 50%;
        position: relative;
      }
      .record-btn::after {
        content: '';
        position: absolute;
        inset: 4px;
        background: red;
        border-radius: 50%;
      }

      .filter-name {
        background: rgba(0,0,0,0.4);
        color: white;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        backdrop-filter: blur(4px);
      }

      /* -------- Tracking/face scan animation for camera overlay -------- */
      @keyframes scan {
        0% { top: 12%; }
        50% { top: 50%; }
        100% { top: 12%; }
      }

      .demo-camera-overlay {
        position: absolute;
        inset: 12%;
        border-radius: 26px;
        border: 2px solid rgba(59, 130, 246, 0.85);
        box-shadow:
          0 0 32px rgba(59, 130, 246, 0.65),
          0 0 0 1px rgba(191, 219, 254, 0.95);
        pointer-events: none;
      }
      .demo-camera-overlay::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: rgba(59, 130, 246, 0.5);
        box-shadow: 0 0 10px #3b82f6;
        animation: scan 3s infinite linear;
        display: none;
      }
      .using-camera .demo-camera-overlay::before {
        display: block;
      }

      /* --------------------------------------------------------- */

      .demo-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: 2px;
      }

      .demo-controls-left {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .chip {
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.6);
        color: #374151;
        background: rgba(255, 255, 255, 0.9);
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .chip-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: #22c55e;
      }

      .chip-dot-warn {
        background: #fbbf24;
      }

      .demo-button-row {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }

      .demo-cta-text {
        font-size: 12px;
        color: var(--fg-muted);
        margin-top: 4px;
      }

      .demo-hint {
        font-size: 11px;
        color: #a16207;
        margin-top: 2px;
      }

      .badge-link {
        font-size: 11px;
        color: #9ca3af;
        text-decoration: underline;
        text-underline-offset: 3px;
        cursor: pointer;
      }

      .exit-icon {
        width: 20px;
        height: 20px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        color: #6b7280;
      }

      @media (max-width: 480px) {
        .app-shell {
          border-radius: 24px;
        }

        .demo-video-frame {
          aspect-ratio: 9 / 16;
        }
        .demo-social-ui { padding: 10px; }
        .record-btn {
          width: 40px;
          height: 40px;
        }
      }

      /* ================= CUSTOM: Social UI Instagram/TikTok overlay enhancements =================== */
      /* Hiệu ứng quét sinh trắc học */
      .scan-line {
        position: absolute;
        left: 0; right: 0; height: 3px;
        background: rgba(34, 197, 94, 0.6);
        box-shadow: 0 0 20px #22c55e;
        z-index: 20;
        display: none;
        animation: scanMove 2.5s linear infinite;
      }

      @keyframes scanMove {
        0% { top: 15%; opacity: 0; }
        50% { opacity: 1; }
        100% { top: 85%; opacity: 0; }
      }

      /* Các nút chức năng nhạy cảm */
      .extra-features {
        position: absolute;
        right: 15px; top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 15px;
        z-index: 25;
      }

      .feature-icon {
        width: 40px; height: 40px;
        background: rgba(0,0,0,0.4);
        backdrop-filter: blur(8px);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: white; font-size: 18px; cursor: pointer;
        border: 1px solid rgba(255,255,255,0.3);
      }

      /* Visualizer cho Voiceprint */
      .voice-bars {
        display: none;
        position: absolute; bottom: 80px; left: 50%;
        transform: translateX(-50%);
        gap: 3px; align-items: flex-end; height: 30px;
      }
      .bar { width: 3px; background: #3b82f6; animation: barGrow 0.5s ease-in-out infinite alternate; }
      @keyframes barGrow { from { height: 5px; } to { height: 25px; } }
      /* ================= END CUSTOM =================== */
    </style>
  </head>
  <body>
    <div id="app" class="app-root">
      <div class="app-shell">
        <header class="app-header">
          <div class="app-title">
            <div class="app-logo">
              <div class="app-logo-inner">AR</div>
            </div>
            <div>
              <div class="app-name">FacePlay Demo</div>
              <div class="app-meta">Preview filter · Short demo</div>
            </div>
          </div>
          <div class="exit-icon" id="headerStatus">●</div>
        </header>
        <main class="app-body" id="appBody"></main>
      </div>
    </div>
    <!-- Social UI overlay example (Instagram/TikTok style, for demo-purposes only):
         You should inject/append this overlay inside your .demo-video-frame in your JS/React/whatever for the real camera view demo.
         Below is a static example for illustration. -->
    <template id="social-ui-template">
      <div class="demo-social-ui">
        <div class="ui-top">
          <div class="filter-name">Dreamy Blush</div>
          <svg width="26" height="26" fill="none" style="opacity:0.64" xmlns="http://www.w3.org/2000/svg"><circle cx="13" cy="13" r="13" fill="#191919"/><g><rect x="8" y="8" width="10" height="10" rx="2" stroke="#FAFAFA" stroke-width="2.2"/></g></svg>
        </div>
        <div class="scan-line"></div>
        <div class="extra-features">
          <div class="feature-icon" title="Tải filter"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 5v7M11 12l-3-3m3 3l3-3M4 17h14" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="feature-icon" title="Chia sẻ"><svg width="18" height="18" fill="none" viewBox="0 0 18 18"><path d="M14 9.5v5a1.5 1.5 0 0 1-1.5 1.5h-7A1.5 1.5 0 0 1 4 14.5v-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="m9 11.5 3-3m-3 3-3-3m3 3V3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="feature-icon" title="Thông tin"><svg width="18" height="18" fill="none" viewBox="0 0 18 18"><circle cx="9" cy="9" r="7.25" stroke="currentColor" stroke-width="1.5"/><rect x="8.25" y="8.25" width="1.5" height="4" rx=".75" fill="currentColor"/><rect x="8.25" y="5.5" width="1.5" height="1.5" rx=".75" fill="currentColor"/></svg></div>
        </div>
        <div class="voice-bars" title="Voiceprint Visualizer">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
        <div class="ui-bottom">
          <div class="record-btn"></div>
        </div>
      </div>
    </template>
    <!-- Sparkles & Dust (Grain) overlay template -->
    <template id="grain-overlay-template">
      <div class="demo-grain-overlay" title="Sparkles & Dust"></div>
    </template>
    <!-- Load MediaPipe Face Landmarker before main app -->
    <script type="module">
      // Pre-load MediaPipe to ensure it's available when needed
      // Try multiple CDN sources
      const tryLoadMediaPipe = async () => {
        const sources = [
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/vision_bundle.js',
          'https://unpkg.com/@mediapipe/tasks-vision@0.10.0/vision_bundle.js',
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/dist/vision_bundle.js'
        ];
        
        for (const src of sources) {
          try {
            const module = await import(src);
            if (module.FaceLandmarker && module.FilesetResolver) {
              window.FaceLandmarker = module.FaceLandmarker;
              window.FilesetResolver = module.FilesetResolver;
              window.__visionReady = true;
              console.log('MediaPipe pre-loaded from', src);
              return;
            }
          } catch (e) {
            console.warn('Failed to load from', src, e);
          }
        }
        
        console.warn('All MediaPipe pre-load attempts failed, will try dynamic import');
        window.__visionReady = false;
      };
      
      tryLoadMediaPipe();
    </script>
    <script type="module" src="../src/main.js"></script>
  </body>
</html>
